<!DOCTYPE html>
<html>
<head>
<title>Student Marks Calculator</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:500px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    padding:8px;
    margin:5px;
    width:90%;
}

button{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th{
    border:1px solid black;
    padding:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Marks Grand Calculator</h2>

<input id="name" placeholder="Student Name">

<input id="math" type="number" placeholder="Math Marks">

<input id="science" type="number" placeholder="Science Marks">

<input id="english" type="number" placeholder="English Marks">

<br>

<button onclick="addStudent()">Add Student</button>


<table>

<thead>
<tr>
<th>Name</th>
<th>Total</th>
<th>%</th>
<th>Grade</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>


</div>


<script>

let students=[];


function addStudent(){

let name=document.getElementById("name").value;

let math=Number(document.getElementById("math").value);

let science=Number(document.getElementById("science").value);

let english=Number(document.getElementById("english").value);



let total=math+science+english;

let percentage=total/3;


let grade;


if(percentage>=90){
    grade="A+";
}
else if(percentage>=75){
    grade="A";
}
else if(percentage>=60){
    grade="B";
}
else if(percentage>=40){
    grade="C";
}
else{
    grade="Fail";
}



let student={
    name:name,
    total:total,
    percentage:percentage.toFixed(2),
    grade:grade
};


students.push(student);


display();



}



function display(){

let table="";


students.forEach((s)=>{

table+=`

<tr>

<td>${s.name}</td>

<td>${s.total}</td>

<td>${s.percentage}%</td>

<td>${s.grade}</td>


</tr>

`;

});


document.getElementById("result").innerHTML=table;


}

</script>

</body>
</html>
